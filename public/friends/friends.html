<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F&F</title>
    <link rel="stylesheet" href="/global.css">
    <link rel="stylesheet" href="/friends/friends.css">
</head>
<body>
    <top-header></top-header>
    <script src="/navMenu.js"></script>
    <div class="container">
        <section class="main">
                <user-profile></user-profile>
                <div class="friends-list">
                    <div class="pick-list">
                        <button id="my-friends-side" class="slide-active">Мои друзья</button>
                        <button id="find-friends-side">Искать друзей</button>
                        <button id="my-requests-side">Мои запросы</button>
                        <button id="blacklist-side">Черный список</button>
                    </div>
                    <div class="list myfriends">
                        
                    </div>
                    <div class="list findfriends hidden">
                        <nav>
                            <div class="param">
                                <p>Write down User`s Name or ID</p>
                                <input id="listff-name" placeholder="User`s name or id">
                            </div>
                        </nav>
                        <div class="ff-event-placeholder">
                            
                        </div>
                    </div>
                    <div class="list myrequests hidden">
                        <nav>
                            <div class="param" id="req-picker">
                                <button class="request-button-picked reqtome">Request to me</button>
                                <button class="reqfromme">Request from me</button>
                            </div>
                        </nav>
                        <div class="request-holder-tome">
                        </div>
                        <div class="request-holder-fromme hidden">
                        </div>
                    </div>
                    <div class="list blacklist hidden">

                    </div>
                </div>
                <div class="news-side">
                    
                </div>
            </section>
        </div>


    <script src="/leftNavMenu.js"></script>
    <script src="/friends/friends.js"></script>
</body>
</html>
