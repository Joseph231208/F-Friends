<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F&F</title>
    <link rel="stylesheet" href="/global.css">
    <link rel="stylesheet" href="/settings/settings.css">
</head>
<body>
    <top-header></top-header>
    <script src="/navMenu.js"></script>
    <div class="container">
        <section class="main">
            <user-profile></user-profile>
            <div class="settings-side">
                <div class="setting-inner">
                    <div class="setblock">
                        <h3>Change my name</h3>
                        <div>
                            <input placeholder="Your name" id="name">
                            <button id="name-trigger">change</button>
                            <div id="nameerror" class="error"></div>
                            <div id="namesuccess" class="success"></div>
                        </div>
                    </div>
                    <div class="setblock">
                        <h3>Change my Age</h3>
                        <div>
                            <input type="date" id="date">
                            <button id="date-trigger">change</button>
                            <div id="dataerror" class="error"></div>
                            <div id="datasuccess" class="success"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="news-side">
                
            </div>
        </section>
    </div>
    <script src="/settings/settings.js"></script>
    <script src="/leftNavMenu.js"></script>
</body>
</html>
