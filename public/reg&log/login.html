<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/global.css">
    <link rel="stylesheet" href="/reg&log/login.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>F&Friends</h1>
            <nav></nav>
            <ul>
                <li id="ToMain-href"></li>
                <li id="ToRules-href"></li>
                <li id="ToGroups-href"></li>
                <li id="Login-href"></li>
            </ul>
        </div>
    </header>
    <div class="container">  
        <section class="login-block">
            <div class="login-inblock">
                <div>
                    <h2>First time on F&F?</h2>
                    <p>make your own account</p>
                </div>
                <div class="input-holder">
                    <p>Email</p>
                    <div class="error"></div>
                    <input id="email" placeholder="Your Email"> 
                </div>
                <div class="password-holder">
                    <p>Password</p>
                    <div class="error"></div>
                    <input id="password" placeholder="Password">
                </div>
                <div>
                    <button id="login-try">Войти</button>
                </div>
                <div class="reg-part">
                    <p>нет аккаунта?</p>
                    <button id="send-to-regpage">создать Аккаунт</button>
                </div>
            </div>
        </section>
    </div>
    <script src="/reg&log/login.js"></script>
    <script src="/global.js"></script>
</body>
</html>
