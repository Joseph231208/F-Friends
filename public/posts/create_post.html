<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/global.css">
    <link rel="stylesheet" href="/posts/create_post.css">
</head>
<body>
    <top-header></top-header>
    <script src="/navMenu.js"></script>
    <div class="container">
        <section class="main">
            <user-profile></user-profile>
            <div class="template-holder">
                <div class="template-inside">
                    <h3>Make your post</h3>
                    <div class="title-block">
                        <p>The title</p>
                        <p class="error"></p>
                        <input id="the_title" maxlength="60" placeholder="here goes your title">
                    </div>
                    <div class="inner-block">
                        <p>Your text</p>
                        <p class="error"></p>
                        <textarea maxlength="1500" id="post-inner-text" placeholder="here goes your main text"></textarea>
                    </div>
                    <button id="save-button">Save</button>
                </div>
            </div>

        </section>
    </div>

    <script src="/leftNavMenu.js"></script>
    <script src="/posts/create_post.js"></script>
</body>
</html>
