<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/global.css">
    <link rel="stylesheet" href="/chats/chat.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>F&Friends</h1>
            <nav></nav>
            <ul>
                <li id="ToMain-href"></li>
                <li id="ToRules-href"></li>
                <li id="ToGroups-href"></li>
                <li id="Login-href"></li>
            </ul>
        </div>
    </header>
    <div class="container">
        <section class="main">
            <div class="user-side">
                <ul>
                    <li id="home-link">Моя страница</li>
                    <li id="friends-link">Друзья</li>
                    <li id="message-link">Сообщения</li>
                    <li id="groups-link">Создать пост</li>
                    <li id="settings-link">настройки аккаунта</li>
                    <li id="quit-link">Выйти из аккаунт</li>
                </ul>
            </div>
            <div class="event-side">
                <div class="user">
                    <img>
                    <div>
                        <h3 id="user-username">Sasha</h3>
                        <p>Нажмите сюда что-бы перейти на страницу контакта</p>
                    </div>
                </div>
                <div class="chat-box-holder">
                    <div class="chat-box">
                        <div class="chat">
                        </div>
                        <div class="input-side">
                            <textarea maxlength="100" id="inner-text" rows="1" cols="40"></textarea>
                            <button id="send-button" class="hidden">Send</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="news-side">
                
            </div>
        </section>
    </div>
    <script src="/global.js"></script>
    <script src="/chats/chat.js"></script>
    <script src="/leftmenu.js"></script>
</body>
</html>
